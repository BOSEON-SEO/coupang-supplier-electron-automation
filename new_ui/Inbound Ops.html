<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Inbound Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --bg-app: #18181B;
    --bg-chrome: #0F0F11;
    --bg-panel: #FAFAF9;
    --bg-panel-2: #F4F4F2;
    --bg-panel-3: #ECECEA;
    --bg-elev: #FFFFFF;
    --border: #E4E4E2;
    --border-strong: #D4D4D1;
    --border-soft: #EDEDEB;
    --text: #18181B;
    --text-2: #52525B;
    --text-3: #8B8B92;
    --text-inv: #FAFAF9;
    --accent: oklch(0.55 0.14 250);
    --accent-soft: oklch(0.95 0.03 250);
    --accent-strong: oklch(0.45 0.16 250);
    --warn: oklch(0.65 0.16 60);
    --warn-soft: oklch(0.96 0.04 60);
    --danger: oklch(0.55 0.20 25);
    --danger-soft: oklch(0.96 0.04 25);
    --ok: oklch(0.58 0.12 155);
    --ok-soft: oklch(0.95 0.04 155);
    --grid-line: #EAEAE8;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --radius: 4px;
    --radius-lg: 6px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px; color: var(--text); background: var(--bg-app);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'tnum' 1, 'cv09' 1;
  }
  #root { height: 100vh; width: 100vw; }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum' 1; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); border: 2px solid transparent; background-clip: padding-box; }

  /* ---- Window chrome ---- */
  .win {
    height: 100vh; width: 100vw; display: flex; flex-direction: column;
    background: var(--bg-chrome);
  }
  .win-titlebar {
    height: 32px; background: var(--bg-chrome); color: #C8C8CC;
    display: flex; align-items: center; padding: 0 12px; gap: 16px;
    -webkit-app-region: drag; user-select: none; flex-shrink: 0;
    border-bottom: 1px solid #232327;
  }
  .win-app-name { font-size: 12px; font-weight: 600; letter-spacing: 0.2px; color: #E5E5EA; display: flex; align-items: center; gap: 8px; }
  .win-app-name .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--accent); }
  .win-menu { display: flex; gap: 2px; -webkit-app-region: no-drag; }
  .win-menu button { padding: 4px 10px; font-size: 12px; color: #A1A1AA; border-radius: 3px; }
  .win-menu button:hover { background: #232327; color: #FAFAF9; }
  .win-spacer { flex: 1; }
  .win-controls { display: flex; -webkit-app-region: no-drag; }
  .win-controls button { width: 44px; height: 32px; display: flex; align-items: center; justify-content: center; color: #C8C8CC; }
  .win-controls button:hover { background: #232327; }
  .win-controls .close:hover { background: #C42B1C; color: white; }

  .win-body { flex: 1; display: flex; min-height: 0; background: var(--bg-panel-2); }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 60px; background: var(--bg-chrome); color: #A1A1AA;
    display: flex; flex-direction: column; align-items: center; padding: 8px 0;
    flex-shrink: 0; gap: 2px;
  }
  .sidebar .nav-item {
    width: 44px; height: 44px; border-radius: 6px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; color: #71717A; transition: background 120ms, color 120ms;
    position: relative;
  }
  .sidebar .nav-item:hover { background: #1F1F23; color: #E4E4E7; }
  .sidebar .nav-item.active { background: #1F1F23; color: #FAFAF9; }
  .sidebar .nav-item.active::before {
    content: ''; position: absolute; left: -8px; top: 8px; bottom: 8px; width: 2px;
    background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .sidebar .nav-item .label { font-size: 9px; font-weight: 500; letter-spacing: 0.2px; }
  .sidebar-divider { width: 28px; height: 1px; background: #27272A; margin: 4px 0; }
  .sidebar-spacer { flex: 1; }
  .sidebar-status { font-size: 9px; color: #52525B; padding: 6px 0; text-align: center; line-height: 1.3; }

  /* ---- Header ---- */
  .header {
    height: 52px; background: var(--bg-elev); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0;
  }
  .header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
  .header .crumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }
  .header .crumb .sep { color: var(--text-3); }
  .header-spacer { flex: 1; }
  .vendor-pill {
    display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 6px;
    background: var(--bg-panel-2); border: 1px solid var(--border);
    border-radius: 999px; font-size: 12px; font-weight: 500;
  }
  .vendor-pill:hover { background: var(--bg-panel-3); }
  .vendor-pill .swatch { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 700; }
  .icon-btn {
    width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; color: var(--text-2);
  }
  .icon-btn:hover { background: var(--bg-panel-3); color: var(--text); }
  .badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px;
    background: var(--bg-panel-3); color: var(--text-2);
    border-radius: 3px; font-size: 11px; font-weight: 500;
  }
  .badge.ok { background: var(--ok-soft); color: var(--ok); }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .badge.danger { background: var(--danger-soft); color: var(--danger); }
  .badge.accent { background: var(--accent-soft); color: var(--accent-strong); }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
    border-radius: 4px; font-size: 12px; font-weight: 500; height: 30px;
    background: var(--bg-elev); color: var(--text); border: 1px solid var(--border-strong);
    transition: background 120ms, border-color 120ms;
  }
  .btn:hover { background: var(--bg-panel-2); border-color: var(--text-3); }
  .btn.primary { background: var(--text); color: var(--text-inv); border-color: var(--text); }
  .btn.primary:hover { background: #2A2A2E; border-color: #2A2A2E; }
  .btn.accent { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.accent:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--text-2); }
  .btn.ghost:hover { background: var(--bg-panel-2); color: var(--text); }
  .btn.sm { height: 26px; padding: 4px 8px; font-size: 11px; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

  /* ---- Phase stepper ---- */
  .phase-stepper { display: flex; align-items: center; gap: 0; }
  .phase {
    display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 8px;
    font-size: 11px; font-weight: 500; color: var(--text-3);
    position: relative;
  }
  .phase .num {
    width: 18px; height: 18px; border-radius: 50%; background: var(--bg-panel-3);
    color: var(--text-3); display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  }
  .phase.done .num { background: var(--ok); color: white; }
  .phase.done { color: var(--text-2); }
  .phase.active .num { background: var(--accent); color: white; box-shadow: 0 0 0 3px var(--accent-soft); }
  .phase.active { color: var(--text); font-weight: 600; }
  .phase-bar { width: 24px; height: 1px; background: var(--border-strong); }
  .phase-bar.done { background: var(--ok); }

  /* ---- Main + RH panel layout ---- */
  .work-area { flex: 1; display: flex; min-width: 0; }
  .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg-panel-2); }
  .web-panel {
    background: var(--bg-chrome); color: #C8C8CC; overflow: hidden;
    display: flex; flex-direction: column; flex-shrink: 0;
    border-left: 1px solid #232327;
    transition: width 240ms cubic-bezier(0.32, 0.72, 0, 1);
  }
  .web-panel.collapsed { width: 0 !important; border-left: none; }
  .web-panel-head { height: 36px; padding: 0 8px 0 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #232327; flex-shrink: 0; }
  .web-panel-head .url { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #71717A; padding: 4px 8px; background: #0A0A0C; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .web-panel-body { flex: 1; overflow: auto; padding: 0; background: white; color: var(--text); position: relative; }
  .web-panel-resize { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; cursor: ew-resize; z-index: 5; }
  .web-panel-resize:hover { background: var(--accent); opacity: 0.4; }

  /* ---- Calendar ---- */
  .cal-wrap { padding: 20px; flex: 1; overflow: auto; }
  .cal-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cal-head h2 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .cal-head .month-nav { display: flex; align-items: center; gap: 2px; }
  .cal-head .sync-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--text-2); }
  .cal-head .sync-pill .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .cal-dow { padding: 8px 10px; font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); background: var(--bg-panel-2); }
  .cal-cell {
    min-height: 110px; padding: 6px; border-right: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft);
    display: flex; flex-direction: column; gap: 3px; position: relative; cursor: default;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.dim { background: var(--bg-panel-2); color: var(--text-3); }
  .cal-cell.today .day-num { background: var(--accent); color: white; }
  .cal-cell .day-num {
    width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  }
  .cal-cell.weekend .day-num { color: var(--danger); }
  .cal-card {
    padding: 4px 6px; border-radius: 3px; font-size: 11px; cursor: pointer;
    border-left: 2px solid var(--accent); background: var(--accent-soft);
    color: var(--accent-strong); display: flex; align-items: center; gap: 4px; line-height: 1.3;
    transition: background 100ms;
  }
  .cal-card:hover { background: oklch(0.92 0.04 250); }
  .cal-card .v-name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-card .seq { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.75; }
  .cal-card .progress-dots { display: flex; gap: 2px; }
  .cal-card .progress-dots span { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.25; }
  .cal-card .progress-dots span.on { opacity: 1; }
  .cal-card.done { border-left-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
  .cal-card.done:hover { background: oklch(0.92 0.04 155); }
  .cal-card.warn { border-left-color: var(--warn); background: var(--warn-soft); color: var(--warn); }

  /* ---- Work View tabs ---- */
  .tabs-bar {
    display: flex; align-items: center; gap: 0; padding: 0 16px;
    background: var(--bg-elev); border-bottom: 1px solid var(--border); height: 36px; flex-shrink: 0;
  }
  .tab {
    height: 36px; padding: 0 14px; display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: var(--text-2);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 120ms, border-color 120ms;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); padding: 1px 5px; background: var(--bg-panel-2); border-radius: 3px; }
  .tab.active .count { background: var(--accent-soft); color: var(--accent-strong); }
  .tabs-spacer { flex: 1; }

  .tool-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    background: var(--bg-elev); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .tool-row .search {
    display: flex; align-items: center; gap: 6px; padding: 0 8px; height: 28px;
    background: var(--bg-panel-2); border: 1px solid var(--border); border-radius: 4px;
    width: 240px;
  }
  .tool-row .search input { border: none; background: transparent; outline: none; flex: 1; font-size: 12px; }
  .tool-row .search input::placeholder { color: var(--text-3); }
  .tool-row .filter-chips { display: flex; gap: 4px; }
  .chip {
    height: 24px; padding: 0 10px; display: inline-flex; align-items: center; gap: 4px;
    border-radius: 999px; font-size: 11px; font-weight: 500;
    background: var(--bg-panel-2); color: var(--text-2); border: 1px solid var(--border);
  }
  .chip:hover { background: var(--bg-panel-3); }
  .chip.active { background: var(--text); color: var(--text-inv); border-color: var(--text); }
  .chip .n { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.7; }

  /* ---- Grid (Excel-like) ---- */
  .grid-wrap { flex: 1; overflow: auto; background: var(--bg-elev); position: relative; min-height: 0; }
  table.gtable { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; font-size: 12px; }
  .gtable thead th {
    position: sticky; top: 0; z-index: 3;
    background: var(--bg-panel-2); border-bottom: 1px solid var(--border-strong);
    border-right: 1px solid var(--border-soft);
    padding: 6px 10px; font-weight: 600; color: var(--text-2); text-align: left;
    white-space: nowrap;
  }
  .gtable thead th.row-num { width: 32px; padding: 6px 6px; text-align: center; color: var(--text-3); position: sticky; left: 0; z-index: 4; }
  .gtable tbody td {
    padding: 5px 10px; border-bottom: 1px solid var(--grid-line); border-right: 1px solid var(--grid-line);
    white-space: nowrap; height: 28px; vertical-align: middle;
  }
  .gtable tbody td.row-num { text-align: center; color: var(--text-3); background: var(--bg-panel-2); position: sticky; left: 0; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; z-index: 2; border-right: 1px solid var(--border-strong); }
  .gtable tbody tr:hover td:not(.row-num) { background: oklch(0.98 0.01 250); }
  .gtable td.editing { box-shadow: inset 0 0 0 2px var(--accent); background: white; padding: 0; }
  .gtable td.editing input { width: 100%; height: 100%; border: none; outline: none; padding: 5px 10px; background: transparent; font: inherit; }
  .gtable td.selected { background: var(--accent-soft) !important; box-shadow: inset 0 0 0 1.5px var(--accent); }
  .gtable td.dirty::after { content: ''; position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; background: var(--warn); border-radius: 50%; }
  .gtable td { position: relative; }
  .gtable td.error { background: var(--danger-soft); color: var(--danger); }
  .gtable td.num { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .pill {
    display: inline-flex; padding: 1px 7px; font-size: 10px; font-weight: 500;
    border-radius: 3px; background: var(--bg-panel-3); color: var(--text-2);
  }
  .pill.ship { background: oklch(0.94 0.04 220); color: oklch(0.42 0.14 220); }
  .pill.milk { background: oklch(0.94 0.05 80); color: oklch(0.42 0.14 80); }
  .pill.send { background: var(--ok-soft); color: var(--ok); }
  .pill.reject { background: var(--danger-soft); color: var(--danger); }
  .pill.partial { background: var(--warn-soft); color: var(--warn); }

  /* ---- Log panel ---- */
  .log-panel {
    background: #0F0F11; color: #C8C8CC; flex-shrink: 0;
    display: flex; flex-direction: column; max-height: 200px;
    border-top: 1px solid var(--border);
  }
  .log-head { height: 28px; padding: 0 12px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #A1A1AA; border-bottom: 1px solid #232327; cursor: pointer; }
  .log-body { padding: 8px 12px; overflow: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6; flex: 1; }
  .log-body .line { display: flex; gap: 8px; }
  .log-body .ts { color: #52525B; flex-shrink: 0; }
  .log-body .lvl { width: 50px; flex-shrink: 0; font-weight: 600; }
  .log-body .lvl.info { color: #6BA3F0; }
  .log-body .lvl.ok { color: #5EBC78; }
  .log-body .lvl.warn { color: #E8B872; }
  .log-body .lvl.err { color: #E87474; }
  .log-body .msg { color: #D4D4D8; }

  /* ---- Transport view ---- */
  .tr-wrap { flex: 1; overflow: auto; padding: 16px; }
  .tr-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .stat-card .lbl { font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.2px; }
  .stat-card .val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-top: 2px; }
  .stat-card .val .unit { font-size: 12px; color: var(--text-3); margin-left: 4px; font-weight: 400; }
  .stat-card .delta { font-size: 11px; color: var(--text-2); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-card .delta .bar { flex: 1; height: 4px; background: var(--bg-panel-3); border-radius: 2px; overflow: hidden; }
  .stat-card .delta .fill { height: 100%; background: var(--accent); }

  .wh-card {
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 12px; overflow: hidden;
  }
  .wh-head { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-soft); background: var(--bg-panel-2); }
  .wh-head .name { font-size: 14px; font-weight: 600; }
  .wh-head .addr { font-size: 11px; color: var(--text-3); }
  .wh-head-spacer { flex: 1; }
  .wh-body { padding: 12px 14px; }
  .wh-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .field-inline { display: flex; flex-direction: column; gap: 2px; }
  .field-inline label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }
  .field-inline select, .field-inline input {
    height: 28px; padding: 0 8px; border: 1px solid var(--border-strong); border-radius: 4px;
    background: var(--bg-elev); font-size: 12px; min-width: 120px;
  }
  .field-inline select:focus, .field-inline input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

  .lot {
    border: 1px solid var(--border); border-radius: 5px; margin-bottom: 8px;
    overflow: hidden; background: var(--bg-elev);
  }
  .lot.ship-lot { border-left: 3px solid oklch(0.55 0.14 220); }
  .lot.milk-lot { border-left: 3px solid oklch(0.62 0.14 80); }
  .lot-head { padding: 8px 12px; display: flex; align-items: center; gap: 10px; background: var(--bg-panel-2); border-bottom: 1px solid var(--border-soft); }
  .lot-head .ttl { font-size: 12px; font-weight: 600; }
  .lot-body { padding: 10px 12px; }

  .pallet-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 8px; }
  .pallet {
    border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px;
    background: var(--bg-panel-2); display: flex; flex-direction: column; gap: 4px;
    position: relative; transition: border-color 120ms;
  }
  .pallet:hover { border-color: var(--text-3); }
  .pallet .label { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .pallet .preset { font-size: 10px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
  .pallet .stack { display: flex; align-items: end; gap: 1px; height: 16px; margin-top: 4px; }
  .pallet .stack span { flex: 1; background: var(--accent); opacity: 0.7; border-radius: 1px 1px 0 0; }
  .pallet .total { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; margin-top: 4px; }
  .pallet.empty .stack span { opacity: 0.15; }
  .pallet.empty { border-style: dashed; }
  .pallet.empty .total { color: var(--warn); }

  .sku-row {
    display: grid; grid-template-columns: 1fr repeat(var(--cols, 2), 90px) 80px;
    gap: 6px; align-items: center; padding: 6px 8px;
    border-bottom: 1px solid var(--grid-line);
  }
  .sku-row:hover { background: var(--bg-panel-2); }
  .sku-row .sku-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sku-row .sku-name .barcode { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); margin-right: 6px; }
  .sku-row .qty-cell {
    height: 26px; border: 1px solid var(--border); border-radius: 3px;
    display: flex; align-items: center; justify-content: end; padding: 0 8px;
    background: var(--bg-elev); font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .sku-row .qty-cell:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .sku-row .qty-cell input { border: none; outline: none; width: 100%; text-align: right; background: transparent; }
  .sku-row .qty-cell.split { background: oklch(0.96 0.04 80); border-color: oklch(0.85 0.06 80); }
  .sku-row .total-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; text-align: right; padding-right: 8px; }
  .sku-row.warn .total-cell { color: var(--warn); }
  .sku-row.ok .total-cell { color: var(--ok); }

  .sku-head {
    display: grid; grid-template-columns: 1fr repeat(var(--cols, 2), 90px) 80px;
    gap: 6px; padding: 4px 8px; font-size: 10px; color: var(--text-3); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border-strong);
  }
  .sku-head > div:not(:first-child) { text-align: right; }

  /* ---- Modals ---- */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(15, 15, 17, 0.5); z-index: 50;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--bg-elev); border-radius: 8px; box-shadow: var(--shadow-lg);
    min-width: 420px; max-width: 90vw; max-height: 90vh; display: flex; flex-direction: column;
    overflow: hidden; border: 1px solid var(--border-strong);
  }
  .modal-head { padding: 14px 18px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-soft); }
  .modal-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .modal-body { padding: 18px; overflow: auto; }
  .modal-foot { padding: 12px 18px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border-soft); background: var(--bg-panel-2); }

  .countdown-ring {
    width: 96px; height: 96px; margin: 8px auto 16px; position: relative;
  }
  .countdown-ring svg { transform: rotate(-90deg); }
  .countdown-ring .num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 600;
  }

  /* ---- Toast ---- */
  .toasts { position: fixed; top: 56px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast {
    background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 6px;
    box-shadow: var(--shadow-md); padding: 10px 14px; display: flex; gap: 10px; align-items: start;
    min-width: 280px; max-width: 360px; animation: slideIn 220ms cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } }
  .toast .icon { flex-shrink: 0; margin-top: 1px; }
  .toast .ttl { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .toast .msg { font-size: 11px; color: var(--text-2); line-height: 1.5; }
  .toast.ok { border-left: 3px solid var(--ok); }
  .toast.warn { border-left: 3px solid var(--warn); }
  .toast.err { border-left: 3px solid var(--danger); }

  /* dropzone */
  .dropzone {
    border: 1.5px dashed var(--border-strong); border-radius: 6px; padding: 20px;
    text-align: center; color: var(--text-2); background: var(--bg-panel-2);
    transition: border-color 120ms, background 120ms;
  }
  .dropzone.drag { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-strong); }
  .dropzone .ttl { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .dropzone .sub { font-size: 11px; color: var(--text-3); }

  /* settings */
  .settings-wrap { padding: 24px; max-width: 880px; }
  .settings-section { margin-bottom: 24px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; }
  .settings-section h3 { margin: 0; padding: 12px 16px; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border-soft); }
  .settings-section .body { padding: 14px 16px; }
  .settings-row { display: grid; grid-template-columns: 180px 1fr; gap: 12px; padding: 8px 0; align-items: center; }
  .settings-row .label { font-size: 12px; color: var(--text-2); }

  /* webview mock */
  .wv-mock { background: white; min-height: 100%; }
  .wv-toolbar { height: 36px; background: oklch(0.97 0.005 250); border-bottom: 1px solid #E5E5E5; padding: 0 10px; display: flex; align-items: center; gap: 6px; }
  .wv-tab { background: white; padding: 6px 12px; font-size: 11px; border-radius: 4px 4px 0 0; border: 1px solid #E5E5E5; border-bottom: none; margin-bottom: -1px; }
  .wv-content { padding: 16px; font-size: 11px; color: #333; }
  .wv-mock-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .wv-mock-table th, .wv-mock-table td { border: 1px solid #DDD; padding: 4px 6px; font-size: 10px; }
  .wv-mock-table th { background: #F5F5F5; }
  .wv-mock-row.highlight { background: oklch(0.95 0.06 90); animation: highlight 1.5s; }
  @keyframes highlight { 0% { background: oklch(0.92 0.10 90); } 100% { background: oklch(0.95 0.06 90); } }

  /* lucide icon helper */
  svg.lucide { stroke-width: 1.75; flex-shrink: 0; }

  /* tweaks-panel slot */
  .tw-floating { position: fixed; bottom: 16px; right: 16px; z-index: 200; }
</style>
</head>
