# tbnws flavor 전용 electron-builder 설정.
# basic.yml 과 99% 동일 — files 의 플러그인 제외 라인만 빠지고 publish 가
# tbnws 채널을 가리킴.
appId: com.tbnws.coupang-supplier-automation
productName: 쿠팡 서플라이어 자동화
directories:
  output: dist-electron
  buildResources: build
asar: true
asarUnpack:
  - python/**/*
  - "**/*.node"
files:
  - dist/**/*
  - main.js
  - preload.js
  - ipc-handlers.js
  - license-service.js
  - update-service.js
  - plugin-main-loader.js
  - src/core/poStyler.js
  - src/core/confirmationBuilder.js
  - src/core/deliveryCompanies.js
  - package.json
  - python/**/*
  - "!**/*.{md,test.js,spec.js}"
  - "!docs/**"
  - "!scripts/**"
  - "!python/.venv/**"
  - "!python/__pycache__/**"
afterPack: ./scripts/electron-fuses.js
releaseInfo:
  releaseNotesFile: release-notes/latest.md
publish:
  - provider: github
    owner: BOSEON-SEO
    repo: coupang-supplier-releases-tbnws
    releaseType: release
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  artifactName: coupang-supplier-automation-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 쿠팡 서플라이어 자동화
